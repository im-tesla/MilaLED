[env:esp12e]
platform = espressif8266
board = esp12e
framework = arduino
board_build.filesystem = littlefs
lib_deps =
  fastled/FastLED
  links2004/WebSockets
  bblanchon/ArduinoJson
  tzapu/WiFiManager
monitor_speed = 115200
upload_speed = 921600
build_flags = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

[env:native]
platform = native
lib_deps =
test_filter = test_pixel_mapper
