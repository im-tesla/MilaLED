[platformio]
; Uncomment the board you're using:
;   ESP8266: esp12e, nodemcuv2, d1_mini, d1, huzzah
;   ESP32:   esp32dev, nodemcu-32s, esp32-s3-devkitc-1, esp32-c6-devkitc-1, esp32-c3-supermini
default_envs = esp32-c3-supermini

; ── ESP8266 ────────────────────────────────────────────────
[env:esp12e]
platform  = espressif8266
board     = esp12e
framework = arduino
board_build.filesystem = littlefs
lib_deps  =
  fastled/FastLED
  links2004/WebSockets
  bblanchon/ArduinoJson
  tzapu/WiFiManager
monitor_speed = 115200
upload_speed  = 921600
build_flags   = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

[env:nodemcuv2]
platform  = espressif8266
board     = nodemcuv2
framework = arduino
board_build.filesystem = littlefs
lib_deps  = ${env:esp12e.lib_deps}
monitor_speed = 115200
upload_speed  = 921600
build_flags   = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

[env:d1_mini]
platform  = espressif8266
board     = d1_mini
framework = arduino
board_build.filesystem = littlefs
lib_deps  = ${env:esp12e.lib_deps}
monitor_speed = 115200
upload_speed  = 921600
build_flags   = -D PIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY

; ── ESP32 ──────────────────────────────────────────────────
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed  = 921600
lib_deps  =
  fastled/FastLED
  links2004/WebSockets
  bblanchon/ArduinoJson
  tzapu/WiFiManager

[env:nodemcu-32s]
platform  = espressif32
board     = nodemcu-32s2
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed  = 921600
lib_deps  = ${env:esp32dev.lib_deps}

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed  = 921600
lib_deps  = ${env:esp32dev.lib_deps}

[env:esp32-c6-devkitc-1]
platform  = espressif32
board     = esp32-c6-devkitc-1
framework = arduino
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed  = 921600
lib_deps  = ${env:esp32dev.lib_deps}

[env:esp32-c3-supermini]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino
board_build.flash_mode = dio
board_build.filesystem = littlefs
monitor_speed = 115200
upload_speed  = 921600
lib_deps  = ${env:esp32dev.lib_deps}

; ── Native test env ────────────────────────────────────────
[env:native]
platform = native
test_filter = test_pixel_mapper
